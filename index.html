<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الهندسية</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; text-align: center; }
        header { background: #2c3e50; color: white; padding: 40px 20px; border-bottom: 4px solid #3498db; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .btn { display: inline-block; background: #3498db; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <h1>المكتبة الهندسية الرقمية</h1>
        <p>بوابتكم التعليمية للموارد الهندسية</p>
    </header>
    <div class="container">
        <div class="card">
            <h3>محاضرات الأنظمة الرقمية</h3>
            <a href="1.pdf" target="_blank" class="btn">فتح الملف 📄</a>
        </div>
        <div class="card">
            <h3>محاضرات تصميم المنطق</h3>
            <a href="2.pdf" target="_blank" class="btn">فتح الملف 📄</a>
        </div>
        <div class="card">
            <h3>محاضرات الخوارزميات</h3>
            <a href="3.pdf" target="_blank" class="btn">فتح الملف 📄</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
