<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الهندسية</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <header>
        <h1>مرحباً بكم في المكتبة الهندسية</h1>
        <p>بوابة الطالب والمهندس للوصول إلى الموارد التعليمية</p>
    </header>

    <div class="container">
        <div class="card">
            <h3>الملف الهندسي الأول</h3>
            <p>عرض وتحميل ملف PDF رقم 1</p>
            <a href="1.pdf" target="_blank" class="btn">فتح الملف</a>
        </div>

        <div class="card">
            <h3>الملف الهندسي الثاني</h3>
            <p>عرض وتحميل ملف PDF رقم 2</p>
            <a href="2.pdf" target="_blank" class="btn">فتح الملف</a>
        </div>

        <div class="card">
            <h3>الملف الهندسي الثالث</h3>
            <p>عرض وتحميل ملف PDF رقم 3</p>
            <a href="3.pdf" target="_blank" class="btn">فتح الملف</a>
        </div>
    </div>

</body>
</html>
