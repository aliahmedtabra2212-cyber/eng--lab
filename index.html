<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الهندسية الرقمية</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        header { background: linear-gradient(135deg, var(--primary), #34495e); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .marquee-container { background: #34495e; color: #fff; padding: 10px 0; font-weight: bold; font-size: 1.1rem; }
        .container { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card h3 { color: var(--primary); margin-bottom: 20px; }
        .button-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
        .btn { padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; transition: 0.2s; border: none; cursor: pointer; color: white; }
        .btn-view { background: var(--accent); }
        .btn-download { background: var(--success); }
        .btn-print { background: #e67e22; }
        footer { text-align: center; padding: 40px; color: #7f8c8d; font-size: 0.9rem; border-top: 1px solid #eee; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <h1>المكتبة الهندسية الرقمية</h1>
    </header>
    <div class="marquee-container">
        <marquee behavior="scroll" direction="right" scrollamount="7">بوابتكم التعليمية للموارد الهندسية .. أهلاً ومرحباً بكم في منصة المهندس علي أحمد الشمري .. </marquee>
    </div>
    <div class="container">
        <div class="card">
            <i class="fas fa-file-pdf fa-3x" style="color: #e74c3c; margin-bottom: 15px;"></i>
            <h3>الأنظمة الرقمية</h3>
            <div class="button-group">
                <a href="1.pdf" target="_blank" class="btn btn-view"><i class="fas fa-eye"></i> عرض</a>
                <a href="1.pdf" download class="btn btn-download"><i class="fas fa-download"></i> تحميل</a>
                <button onclick="window.open('1.pdf').print()" class="btn btn-print"><i class="fas fa-print"></i> طباعة</button>
            </div>
        </div>
        <div class="card">
            <i class="fas fa-microchip fa-3x" style="color: #2ecc71; margin-bottom: 15px;"></i>
            <h3>تصميم المنطق</h3>
            <div class="button-group">
                <a href="2.pdf" target="_blank" class="btn btn-view"><i class="fas fa-eye"></i> عرض</a>
                <a href="2.pdf" download class="btn btn-download"><i class="fas fa-download"></i> تحميل</a>
                <button onclick="window.open('2.pdf').print()" class="btn btn-print"><i class="fas fa-print"></i> طباعة</button>
            </div>
        </div>
        <div class="card">
            <i class="fas fa-code fa-3x" style="color: #f1c40f; margin-bottom: 15px;"></i>
            <h3>الخوارزميات</h3>
            <div class="button-group">
                <a href="3.pdf" target="_blank" class="btn btn-view"><i class="fas fa-eye"></i> عرض</a>
                <a href="3.pdf" download class="btn btn-download"><i class="fas fa-download"></i> تحميل</a>
                <button onclick="window.open('3.pdf').print()" class="btn btn-print"><i class="fas fa-print"></i> طباعة</button>
            </div>
        </div>
    </div>
    <footer>&copy; 2026 جميع الحقوق محفوظة | المهندس علي أحمد الشمري</footer>
</body>
</html>
