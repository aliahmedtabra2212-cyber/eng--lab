The Netlify deploy errored, with the following guidance provided:

Diagnosis
- The build command configured in Netlify is "bun run build" ([line 50](#L50)). Bun reports "Script not found 'build'" ([line 51](#L51)) and the build fails with that error ([line 56](#L56)-[line 61](#L61)). Netlify's resolved config shows the build command coming from your config ([line 63](#L63)-[line 68](#L68)).
- Error type: missing npm script. Cause: bun cannot find a "build" script in package.json (package.json is missing, lacks a "build" script, or is not committed to the repo), while netlify.toml expects "bun run build".

Solution
1) Verify package.json is present and committed
- Ensure package.json is at the repository root (same place as netlify.toml) and is committed. If package.json is missing or not committed, add/commit it before changing Netlify config.

2) Add or fix the "build" script
- Open package.json and add a "build" script that runs your Hydrogen build command. Example (Hydrogen/Vite style):
```json
{
  "scripts": {
    "build": "hydrogen build"
  }
}
```
Or, if your project uses Vite directly:
```json
{
  "scripts": {
    "build": "vite build"
  }
}
```
- Commit and push:
```bash
git add package.json
git commit -m "Add build script"
git push
```

3) Or change Netlify's build command to the actual build command you use
- If you prefer not to add a package.json script, update netlify.toml to a command that actually exists (for example, use the direct CLI that builds your app). Edit netlify.toml (root) to set:
```
[build]
  command = "npm run build"  # or the actual command you use
  publish = "dist"
```
(Use the command that corresponds to what’s installed in your repo/environment.)

4) Test locally with the same runtime Netlify uses
- Netlify ran Node v22 and used bun to run your script ([line 12](#L12), [line 16](#L16), [line 50](#L50)). Test locally with:
```bash
# to mirror Netlify's step that failed
bun run build
# or (if you changed to npm)
npm run build
```
Fixing package.json (or the build command in netlify.toml) so that a "build" script exists and is runnable will resolve the "Script not found 'build'" error and allow the Netlify build to proceed.

